<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Enam Shoes Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            overscroll-behavior: none;
        }

        /* Animasi masuk */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
        }

        @media (max-width: 350px) {
            .login-card { padding: 25px 15px; }
            h2 { font-size: 20px !important; }
        }

        .logo-wrapper { margin-bottom: 20px; }

        .logo { 
            max-width: 100px; 
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        h2 { 
            margin: 0 0 8px 0; 
            color: var(--text-dark); 
            font-size: 22px; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .input-group {
            text-align: left;
            margin-bottom: 12px;
        }

           input {
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid #e2e8f0;
        border-radius: 12px;
        box-sizing: border-box;
        font-size: 16px; /* Mencegah auto-zoom di ios */
        font-family: inherit;
        transition: all 0.2s ease;
        background: #fdfdfd;
        -webkit-appearance: none; /* Tambahkan tanda minus di depan */
        appearance: none;         /* Tambahkan ini juga agar standar */
    }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-login:hover { background: var(--primary-hover); }
        .btn-login:active { transform: scale(0.98); }

        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-wrapper">
        <img src="logo.png" class="logo" alt="Logo Enam Shoes">
    </div>
    <h2>Selamat Datang</h2>
    <p>Silakan masuk ke akun Kasir Anda</p>
    
    <form id="loginForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="Username" required autocomplete="username" spellcheck="false">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Masuk ke Sistem</button>
    </form>

    <div class="footer-text">
        &copy; 2026 Enam Shoes Care
    </div>
</div>

<script>
    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        // FITUR LOGIN ASLI (TIDAK BERUBAH)
        if(u === 'admin' && p === 'wdntr12') {
            sessionStorage.setItem('role', 'admin');
            window.location.href = 'index.html';
        } else if(u === 'staf' && p === 'staf123') {
            sessionStorage.setItem('role', 'staff'); 
            window.location.href = 'index.html';
        } else {
            alert("Login Gagal! Periksa kembali username/password.");
        }
    };
</script>

</body>
</html>
