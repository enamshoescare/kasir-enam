<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Enam Shoes Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* Animasi masuk */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .logo-wrapper {
            margin-bottom: 24px;
        }

        .logo { 
            max-width: 110px; 
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        
        .logo:hover {
            transform: scale(1.05);
        }

        h2 { 
            margin: 0 0 8px 0; 
            color: var(--text-dark); 
            font-size: 24px; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            background: #fdfdfd;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-wrapper">
        <img src="logo.png" class="logo" alt="Logo Enam Shoes">
    </div>
    <h2>Selamat Datang</h2>
    <p>Silakan masuk ke akun Kasir Anda</p>
    
    <form id="loginForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="Username" required autocomplete="username">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Masuk ke Sistem</button>
    </form>

    <div class="footer-text">
        &copy; 2026 Enam Shoes Care
    </div>
</div>

<script>
    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        // Logika tetap sama seperti permintaan Anda
        if(u === 'admin' && p === 'wdntr12') {
            sessionStorage.setItem('role', 'admin');
            window.location.href = 'index.html';
        } else if(u === 'staf' && p === 'staf123') {
            sessionStorage.setItem('role', 'staff'); // Diubah ke 'staff' agar sinkron dengan file index & rekapan sebelumnya
            window.location.href = 'index.html';
        } else {
            alert("Login Gagal! Periksa kembali username/password.");
        }
    };
</script>

</body>
</html>
