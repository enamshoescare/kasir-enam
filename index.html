<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transaksi - Enam Shoes Care</title>
    <!-- MENGHUBUNGKAN CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav-bar">
        <a href="index.html" class="nav-btn active">➕ Transaksi</a>
        <a href="rekapan.html" id="navRekapan" class="nav-btn">📊 Rekapan</a>
        <button onclick="logout()" class="nav-btn" style="color: var(--danger);">Logout</button>
    </nav>

    <div class="container">
        <div class="logo-container"><img src="logo.png" class="main-logo" alt="Logo"></div>
        <h2>KASIR ENAM</h2>
        
        <div class="form-group">
            <label>Nama Pelanggan</label>
            <input type="text" id="nama" placeholder="Masukkan nama">
        </div>
        
        <div class="form-group">
            <label>Nomor WhatsApp</label>
            <input type="number" id="whatsapp" placeholder="0812xxxx" inputmode="tel">
        </div>
        
        <div class="form-group">
            <label>Pilih Layanan</label>
            <div id="serviceList" class="service-box"></div>
            
            <div id="adminArea" class="admin-panel">
                <label>+ Tambah Layanan Baru</label>
                <div class="admin-input-group">
                    <input type="text" id="newServiceName" placeholder="Nama">
                    <input type="number" id="newServicePrice" placeholder="Rp">
                    <button type="button" onclick="tambahLayananBaru()">+</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Status Pembayaran</label>
            <select id="statusBayar" onchange="toggleBayarInput()">
                <option value="">-- Pilih Status --</option>
                <option value="Lunas">Lunas (Bayar Sekarang)</option>
                <option value="Belum Lunas">Belum Lunas (Bayar Nanti)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Metode Pembayaran</label>
            <select id="metodeBayar">
                <option value="">-- Pilih Metode --</option>
                <option value="Tunai">Tunai (Cash)</option>
                <option value="Transfer">Transfer / QRIS</option>
            </select>
        </div>

        <div class="form-group">
            <label>Potongan Diskon (Rp)</label>
            <input type="number" id="diskon" placeholder="0" oninput="hitungTotalOtomatis()">
        </div>
        
        <div class="form-group">
            <label>Uang Dibayar (Rp)</label>
            <input type="number" id="bayar" placeholder="0" oninput="hitungTotalOtomatis()">
        </div>

        <div class="payment-summary">
            <div class="summary-row"><span>Subtotal:</span><span id="txtSubtotal">Rp 0</span></div>
            <div class="summary-row"><span>Diskon:</span><span id="txtDiskon" style="color:red">- Rp 0</span></div>
            <div class="summary-row summary-total"><span>TOTAL AKHIR:</span><span id="txtTotalAkhir">Rp 0</span></div>
            <div class="summary-row" style="margin-top:8px; font-weight:bold;"><span id="labelKembalian">Kembalian:</span><span id="txtKembalian" style="color:var(--primary)">Rp 0</span></div>
        </div>
        
        <button class="btn btn-wa" onclick="prosesTransaksi()">Kirim WA & Simpan</button>
    </div>

    <!-- MODAL BERHASIL -->
    <div id="printModal">
        <div class="modal-content">
            <h3 style="margin-top:0">Berhasil!</h3>
            <p>Transaksi telah disimpan.</p>
            <button class="btn" style="background:var(--primary)" onclick="cetakNotaFisik()">🖨️ Cetak Nota</button>
            <button class="btn" style="background:var(--secondary); padding: 12px;" onclick="location.reload()">❌ Selesai</button>
        </div>
    </div>

    <!-- AREA CETAK NOTA -->
    <div id="notaCetak">
        <center>
            <img src="logo.png" alt="Logo" style="max-width: 20mm; margin-bottom: 5px;">
            <h3 style="margin: 0; font-size: 12px;">ENAM SHOES CARE</h3>
            <div class="line"></div>
        </center>
        <div id="notaInv" class="text-bold"></div>
        <div id="notaTgl"></div>
        <div id="notaNama"></div>
        <div id="notaWA"></div> 
        <div id="notaMetode"></div>
        <div id="areaStatusNota"></div> 
        <div id="notaDetail"></div>
        <div class="line"></div>
        <div class="flex-between"><span>Subtotal:</span><span id="nSub"></span></div>
        <div class="flex-between"><span>Diskon:</span><span id="nDisk"></span></div>
        <div class="flex-between text-bold" style="font-size: 11px; margin-top:2px;"><span>TOTAL:</span><span id="nTotal"></span></div>
        <div class="flex-between"><span>BAYAR:</span><span id="nBayar"></span></div>
        <div class="flex-between"><span id="labelNKembali">KEMBALI:</span><span id="nKembali"></span></div>
        <center style="margin-top: 15px;">Terima Kasih</center>
    </div>

    <!-- MENGHUBUNGKAN JS -->
    <script src="script.js"></script>
</body>
</html>
